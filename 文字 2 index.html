<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沙龍同意書系統</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; max-width: 600px; margin: auto; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { padding: 10px 20px; cursor: pointer; }
        #content { border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; }
        canvas { border: 1px solid #000; width: 100%; height: 200px; touch-action: none; }
    </style>
</head>
<body>
    <div class="btn-group">
        <button onclick="setDoc('漂髮')">漂髮</button>
        <button onclick="setDoc('接髮')">接髮</button>
    </div>

    <div id="content">
        <h2 id="title">請選擇項目</h2>
        <div id="text">請先選擇上方同意書類型。</div>
        <p>日期：<span id="date"></span></p>
        <p>姓名：<input type="text" id="name" placeholder="請輸入姓名"></p>
        <p>本人簽名：</p>
        <canvas id="sigCanvas"></canvas>
    </div>
    <button onclick="saveImage()">儲存並下載圖片</button>

    <script>
        const canvas = document.getElementById('sigCanvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        document.getElementById('date').innerText = new Date().toLocaleDateString();

        function setDoc(type) {
            document.getElementById('title').innerText = type + "施作前同意書";
            const text = type === '漂髮' ? 
                "一、髮況告知：已告知過去處理紀錄。二、風險：了解漂髮屬高化學處理，可能受損、斷裂。三、頭皮：了解可能產生刺癢不適。四、售後：5日內微調。五、聲明：理解風險並承擔。" :
                "一、髮況告知：已告知過去處理紀錄。二、風險：了解接髮可能產生拉扯感、異物感。三、護理：需依指示洗護，未定期回店調整由顧客負擔責任。四、售後：7日內調整。五、聲明：理解護理須知並同意施作。";
            document.getElementById('text').innerText = text;
        }

        canvas.addEventListener('mousedown', () => drawing = true);
        canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
        canvas.addEventListener('mousemove', (e) => {
            if (!drawing) return;
            ctx.lineWidth = 2;
            ctx.lineTo(e.offsetX, e.offsetY);
            ctx.stroke();
        });

        function saveImage() {
            const name = document.getElementById('name').value || '顧客';
            const link = document.createElement('a');
            link.download = `${new Date().toLocaleDateString()}_${name}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
